// Fetch shared leaderboard on load
async function fetchLeaderboard() {
  try {
    const res = await fetch(LB_BLOB, {headers:{"Accept":"application/json"}});
    if (res.ok) {
      const data = await res.json();
      leaderboard = data;
      localStorage.setItem("dm_leaderboard", JSON.stringify(data));
    }
  } catch(e) { console.warn("Could not fetch shared leaderboard:", e); }
}
async function submitScore(boardKey, name, time, moves) {
  try {
    // Read current data, merge new score, write back
    const res = await fetch(LB_BLOB, {headers:{"Accept":"application/json"}});
    if (!res.ok) return;
    const data = await res.json();
    if (!data[boardKey]) data[boardKey] = [];
    const roundedTime = Math.round(time*100)/100;
    const existing = data[boardKey].find(e => e.name === name);
    if (existing) {
      if (roundedTime < existing.time) { existing.time = roundedTime; existing.moves = moves; }
    } else {
      data[boardKey].push({name, time: roundedTime, moves});
    }
    data[boardKey].sort((a,b) => a.time - b.time);
    data[boardKey] = data[boardKey].slice(0, 10);
    await fetch(LB_BLOB, {
      method: "PUT",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(data)
    });
    leaderboard = data;
    localStorage.setItem("dm_leaderboard", JSON.stringify(data));
  } catch(e) { console.warn("Score submit failed:", e); }
}

function rgb(c, a) { return a !== undefined ? `rgba(${c[0]},${c[1]},${c[2]},${a})` : `rgb(${c[0]},${c[1]},${c[2]})`; }
function shade(c, amt) { return c.map(v => Math.max(0, Math.min(255, v + amt))); }

// ─── MAZE GENERATION ───
function generateMaze(w, h) {
  const grid = [];
  for (let y = 0; y < h; y++) {
    grid[y] = [];
    for (let x = 0; x < w; x++) grid[y][x] = new Set(["N","S","E","W"]);
  }
  const visited = Array.from({length:h}, ()=>Array(w).fill(false));
  const stack = [[0,0]];
  visited[0][0] = true;
  const dirs = [[0,-1,"N","S"],[0,1,"S","N"],[1,0,"E","W"],[-1,0,"W","E"]];
  while (stack.length) {
    const [cx,cy] = stack[stack.length-1];
    const nbrs = [];
    for (const [dx,dy,d,o] of dirs) {
      const nx=cx+dx, ny=cy+dy;
      if (nx>=0 && nx<w && ny>=0 && ny<h && !visited[ny][nx]) nbrs.push([nx,ny,d,o]);
    }
    if (nbrs.length) {
      const [nx,ny,d,o] = nbrs[Math.random()*nbrs.length|0];
      grid[cy][cx].delete(d);
      grid[ny][nx].delete(o);
      visited[ny][nx] = true;
      stack.push([nx,ny]);
    } else stack.pop();
  }
  return { w, h, grid, canMove(x,y,d) { return x>=0 && x<w && y>=0 && y<h && !grid[y][x].has(d); } };
}

// ─── DRAGON SPRITES ───
const dragonSprites = {};
let spritesLoaded = 0;
const SPRITE_TOTAL = 16;
const COLOUR_NAMES_LC = Object.keys(DRAGON_COLOURS).map(n => n.toLowerCase());

function preloadSprites() {
  for (const name of Object.keys(DRAGON_COLOURS)) {
    for (const w of ["wings", "nowings"]) {
      const key = `${name.toLowerCase()}_${w}`;
      const img = new window.Image();
      img.onload = () => { spritesLoaded++; };
      img.src = `sprites/dragon_${key}.png?v=5`;
      dragonSprites[key] = img;
    }
  }
}
preloadSprites();

function drawDragon(cx, cy, scale, dir, t, colourArr, eyeStyle, wings) {
  // Find colour name from array
  let colName = "red";
  for (const [name, c] of Object.entries(DRAGON_COLOURS)) {
    if (c[0]===colourArr[0] && c[1]===colourArr[1] && c[2]===colourArr[2]) { colName = name.toLowerCase(); break; }
  }
  const key = `${colName}_${wings ? "wings" : "nowings"}`;
  const sprite = dragonSprites[key];

  // Render size based on scale
  const renderSize = Math.max(30, scale * 84);

  ctx.save();

  // Bob animation
  const bob = Math.sin(t * 3) * 2 * scale;

  // Flip for left-facing
  if (dir === "left") {
    ctx.translate(cx, cy + bob);
    ctx.scale(-1, 1);
    ctx.translate(-cx, -(cy + bob));
  }

  if (sprite && sprite.complete && sprite.naturalWidth > 0) {
    ctx.drawImage(sprite, cx - renderSize/2, cy + bob - renderSize/2, renderSize, renderSize);
  } else {
    // Fallback while loading
    ctx.fillStyle = rgb(colourArr, 0.5);
    ctx.beginPath(); ctx.arc(cx, cy + bob, renderSize/3, 0, Math.PI*2); ctx.fill();
    drawText("...", cx, cy + bob, {size: renderSize/4, colour: "#fff"});
  }

  ctx.restore();
}

// Keep old function signature compatible - unused but prevents errors
function drawDragonOld(cx, cy, scale, dir, t, colour, eyeStyle, wings) {
  const s = scale;
  const r = colour[0], g = colour[1], b = colour[2];
  const bob = Math.sin(t * 3) * 2 * s;
  cy += bob;
  ctx.save();

  // Shadow
  ctx.fillStyle = "rgba(0,0,0,0.15)";
  ctx.beginPath(); ctx.ellipse(cx, cy + 22*s, 18*s, 4*s, 0, 0, Math.PI*2); ctx.fill();

  // Tail
  const tailSign = dir === "left" ? 1 : -1;
  ctx.strokeStyle = rgb(shade(colour, -15));
  ctx.lineWidth = 5*s;
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(cx + tailSign*14*s, cy + 2*s);
  for (let i = 1; i <= 8; i++) {
    const tt = i/8;
    const tx = cx + tailSign*(14*s + tt*28*s);
    const ty = cy + 2*s + Math.sin(t*4 + tt*3)*4*s*tt + tt*6*s - tt*tt*10*s;
    ctx.lineTo(tx, ty);
  }
  ctx.stroke();
  // Tail spade
  const tipX = cx + tailSign*42*s, tipY = cy - 2*s;
  ctx.fillStyle = rgb(shade(colour, -40));
  ctx.beginPath();
  ctx.moveTo(tipX, tipY-5*s); ctx.lineTo(tipX+tailSign*10*s, tipY); ctx.lineTo(tipX, tipY+5*s);
  ctx.fill();

  // Wings
  if (wings) {
    const flap = Math.sin(t * 5) * 8 * s;
    for (const side of [-1, 1]) {
      ctx.fillStyle = rgb(shade(colour, -25), 0.6);
      ctx.beginPath();
      ctx.moveTo(cx + side*8*s, cy - 4*s);
      ctx.lineTo(cx + side*35*s, cy - 28*s - flap);
      ctx.lineTo(cx + side*38*s, cy - 12*s - flap*0.6);
      ctx.lineTo(cx + side*30*s, cy + 2*s - flap*0.3);
      ctx.lineTo(cx + side*6*s, cy + 5*s);
      ctx.fill();
      // Bones
      ctx.strokeStyle = rgb(shade(colour, -55));
      ctx.lineWidth = 2*s;
      ctx.beginPath();
      ctx.moveTo(cx+side*8*s, cy-4*s);
      ctx.lineTo(cx+side*25*s, cy-20*s-flap*0.8);
      ctx.lineTo(cx+side*35*s, cy-28*s-flap);
      ctx.moveTo(cx+side*25*s, cy-20*s-flap*0.8);
      ctx.lineTo(cx+side*38*s, cy-12*s-flap*0.6);
      ctx.stroke();
    }
  }

  // Legs
  for (const lx of [-8*s, 8*s]) {
    ctx.fillStyle = rgb(shade(colour, -20));
    ctx.beginPath(); ctx.ellipse(cx+lx, cy+14*s, 5*s, 8*s, 0, 0, Math.PI*2); ctx.fill();
    // Claws
    for (const co of [-3*s, 0, 3*s]) {
      ctx.fillStyle = "#3a3530";
      ctx.beginPath();
      ctx.moveTo(cx+lx+co-1.5*s, cy+20*s); ctx.lineTo(cx+lx+co, cy+25*s); ctx.lineTo(cx+lx+co+1.5*s, cy+20*s);
      ctx.fill();
    }
  }

  // Body gradient
  for (let i = 0; i < 5; i++) {
    const t2 = i/4;
    ctx.fillStyle = rgb(shade(colour, -20 + t2*40));
    ctx.beginPath();
    ctx.ellipse(cx + i*0.5*s, cy + i*0.5*s, (22-i*1.5)*s, (18-i*1.5)*s, 0, 0, Math.PI*2);
    ctx.fill();
  }
  // Body outline
  ctx.strokeStyle = rgb(shade(colour, -50)); ctx.lineWidth = 2*s;
  ctx.beginPath(); ctx.ellipse(cx, cy, 22*s, 18*s, 0, 0, Math.PI*2); ctx.stroke();

  // Belly plates
  const bellyC = shade(colour, 65);
  for (let i = 0; i < 4; i++) {
    const pw = (12 - Math.abs(i-1.5)*3)*s;
    const py = cy - 3*s + i*5*s;
    ctx.fillStyle = rgb(i%2?shade(bellyC,10):bellyC);
    ctx.beginPath(); ctx.ellipse(cx, py, pw, 3*s, 0, 0, Math.PI*2); ctx.fill();
  }

  // Scales
  ctx.fillStyle = rgb(shade(colour, -25), 0.3);
  for (let row=0; row<4; row++) {
    for (let col=0; col<5; col++) {
      const sx = cx - 10*s + (col + (row%2?0.5:0))*5*s;
      const sy = cy - 8*s + row*4.5*s;
      const dx = (sx-cx)/(22*s), dy = (sy-cy)/(18*s);
      if (dx*dx+dy*dy < 0.6) {
        ctx.beginPath(); ctx.ellipse(sx, sy, 2.5*s, 1.5*s, 0, 0, Math.PI*2); ctx.fill();
      }
    }
  }

  // Head
  const hOff = {right:[16,-8], left:[-16,-8], up:[0,-18], down:[0,12]};
  const [hox, hoy] = (hOff[dir] || hOff.right).map(v => v*s);
  const hx = cx + hox, hy = cy + hoy;
  // Head shape
  for (let i=0; i<4; i++) {
    ctx.fillStyle = rgb(shade(colour, -10+i*15));
    ctx.beginPath(); ctx.ellipse(hx+i*0.3*s, hy+i*0.3*s, (12-i)*s, (10-i)*s, 0, 0, Math.PI*2); ctx.fill();
  }
  ctx.strokeStyle = rgb(shade(colour,-45)); ctx.lineWidth = 1.5*s;
  ctx.beginPath(); ctx.ellipse(hx, hy, 12*s, 10*s, 0, 0, Math.PI*2); ctx.stroke();

  // Snout
  const sOff = {right:[10,3], left:[-10,3], up:[0,-10], down:[0,10]};
  const [sox, soy] = (sOff[dir]||sOff.right).map(v=>v*s);
  ctx.fillStyle = rgb(shade(colour, 20));
  ctx.beginPath(); ctx.ellipse(hx+sox, hy+soy, 7*s, 5*s, 0, 0, Math.PI*2); ctx.fill();

  // Nostrils
  ctx.fillStyle = "#2a1414";
  if (dir==="right"||dir==="left") {
    const ns = dir==="right"?1:-1;
    ctx.beginPath(); ctx.ellipse(hx+sox+ns*5*s, hy+soy-2*s, 1.8*s, 1.2*s, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(hx+sox+ns*5*s, hy+soy+2*s, 1.8*s, 1.2*s, 0, 0, Math.PI*2); ctx.fill();
  }

  // Horns
  const hornC = "#bda882";
  for (const hAngle of [0.4, 0.55]) {
    const hornLen = (hAngle<0.5?14:10)*s;
    ctx.strokeStyle = hornC; ctx.lineWidth = 3*s; ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(hx, hy-9*s);
    ctx.quadraticCurveTo(hx + Math.cos(hAngle*Math.PI)*hornLen*0.6, hy-9*s - Math.sin(hAngle*Math.PI)*hornLen*0.6,
      hx + Math.cos(hAngle*Math.PI)*hornLen, hy-9*s - Math.sin(hAngle*Math.PI)*hornLen);
    ctx.stroke();
  }

  // Spines
  ctx.fillStyle = rgb(shade(colour, -45));
  for (let i=0; i<6; i++) {
    const tt = i/5;
    const spx = hx + (cx-hx)*tt*1.2;
    const spy = hy + (cy-hy)*tt - 14*s*(1-Math.abs(tt-0.5)*2);
    const spH = (6 + Math.abs(3-i)*2)*s;
    ctx.beginPath();
    ctx.moveTo(spx-2*s, spy); ctx.lineTo(spx, spy-spH); ctx.lineTo(spx+2*s, spy);
    ctx.fill();
  }

  // Eyes
  const eyeS = eyeStyle;
  const sizeMult = {small:0.6, medium:0.8, big:1.0}[eyeS.size];
  const er = 5*s*sizeMult;
  let eyes;
  if (dir==="right"||dir==="left") {
    const es = dir==="right"?1:-1;
    eyes = [[hx+es*4*s, hy-4*s], [hx+es*4*s, hy+2*s]];
  } else if (dir==="up") {
    eyes = [[hx-4*s, hy-3*s], [hx+4*s, hy-3*s]];
  } else {
    eyes = [[hx-4*s, hy+3*s], [hx+4*s, hy+3*s]];
  }
  for (const [ex, ey] of eyes) {
    // Socket
    ctx.fillStyle = rgb(shade(colour, -35));
    ctx.beginPath(); ctx.arc(ex, ey, er+2*s, 0, Math.PI*2); ctx.fill();

    if (eyeS.shape === "round") {
      ctx.fillStyle = "#fcfaf0"; ctx.beginPath(); ctx.arc(ex,ey,er,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = rgb(eyeS.colour); ctx.beginPath(); ctx.arc(ex,ey,er*0.6,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = "#050505"; ctx.beginPath(); ctx.arc(ex,ey,er*0.28,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,0.85)"; ctx.beginPath(); ctx.arc(ex-er*0.25,ey-er*0.25,er*0.18,0,Math.PI*2); ctx.fill();
    } else if (eyeS.shape === "cat") {
      ctx.fillStyle = rgb(eyeS.colour); ctx.beginPath(); ctx.arc(ex,ey,er,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = rgb(shade(eyeS.colour,40)); ctx.beginPath(); ctx.arc(ex,ey,er*0.75,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = "#050505"; ctx.fillRect(ex-1*s, ey-er+2*s, 2*s, er*2-4*s);
    } else if (eyeS.shape === "angry") {
      ctx.fillStyle = "#fcf0e8"; ctx.beginPath(); ctx.arc(ex,ey,er,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = rgb(eyeS.colour); ctx.beginPath(); ctx.arc(ex,ey,er*0.5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = "#050505"; ctx.beginPath(); ctx.arc(ex,ey,er*0.2,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle = "#1e1e1e"; ctx.lineWidth = 2*s;
      ctx.beginPath(); ctx.moveTo(ex-er,ey-er-1*s); ctx.lineTo(ex+er,ey-er-4*s); ctx.stroke();
    } else if (eyeS.shape === "cute") {
      ctx.fillStyle = "#fcfaf5"; ctx.beginPath(); ctx.arc(ex,ey,er,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = rgb(eyeS.colour); ctx.beginPath(); ctx.arc(ex,ey,er*0.75,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = "#050505"; ctx.beginPath(); ctx.arc(ex,ey+er*0.1,er*0.3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,0.9)"; ctx.beginPath(); ctx.arc(ex-er*0.25,ey-er*0.25,er*0.28,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,0.7)"; ctx.beginPath(); ctx.arc(ex+er*0.2,ey+er*0.15,er*0.1,0,Math.PI*2); ctx.fill();
    } else if (eyeS.shape === "star") {
      ctx.fillStyle = rgb(eyeS.colour); ctx.beginPath(); ctx.arc(ex,ey,er,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = "#0a0a0a";
      ctx.beginPath();
      for (let i=0;i<10;i++){
        const a=-Math.PI/2+i*Math.PI/5;
        const rr=i%2?er*0.5:er*0.22;
        i?ctx.lineTo(ex+rr*Math.cos(a),ey+rr*Math.sin(a)):ctx.moveTo(ex+rr*Math.cos(a),ey+rr*Math.sin(a));
      }
      ctx.fill();
    }
    ctx.strokeStyle = "#1e1e1e"; ctx.lineWidth = 1*s;
    ctx.beginPath(); ctx.arc(ex,ey,er,0,Math.PI*2); ctx.stroke();
  }

  ctx.restore();
} // end drawDragonOld

// ─── UI HELPERS ───
let hoveredBtn = null;
const buttons = [];
function btn(x, y, w, h, text, opts={}) {
  const b = {x,y,w,h,text,...opts,id:buttons.length};
  buttons.push(b);
  return b;
}
function clearButtons() { buttons.length = 0; }
function drawBtn(b) {
  if (b.alpha === 0) return; // invisible hit area, don't draw
  const hov = hoveredBtn === b;
  let col = b.colour || [200,200,200];
  if (b.selected) col = [255,215,0];
  if (hov) col = shade(col, 25);
  ctx.fillStyle = rgb(col);
  roundRect(b.x, b.y, b.w, b.h, 6);
  ctx.fill();
  ctx.strokeStyle = "#000"; ctx.lineWidth = 1.5;
  roundRect(b.x, b.y, b.w, b.h, 6); ctx.stroke();
  ctx.fillStyle = b.textColour || "#000";
  ctx.font = `bold ${b.fontSize||16}px Arial`;
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(b.text, b.x + b.w/2, b.y + b.h/2);
}
function roundRect(x,y,w,h,r) {
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}
function drawText(text, x, y, opts={}) {
  ctx.fillStyle = opts.colour || "#fff";
  ctx.font = `${opts.bold?"bold ":""}${opts.size||16}px ${opts.font||"Arial"}`;
  ctx.textAlign = opts.align || "center";
  ctx.textBaseline = opts.base || "middle";
  ctx.fillText(text, x, y);
}
function drawCredit() {
  drawText("Designed and built by Rose Trailor using Claude Code", W/2, H-16, {size:16, colour:"#a896c8", bold:true});
}

// ─── MAZE DRAWING ───
function drawMaze() {
  const m = maze;
  for (let y = 0; y < m.h; y++) {
    for (let x = 0; x < m.w; x++) {
      const px = mazeOX + x*cellSize, py = mazeOY + y*cellSize;
      ctx.fillStyle = (x===0&&y===0) ? "#78dc78" : (x===endX&&y===endY) ? "#ffc850" : "#e0d5f0";
      ctx.fillRect(px, py, cellSize, cellSize);
    }
  }
  ctx.strokeStyle = "#3c2850"; ctx.lineWidth = 3;
  for (let y = 0; y < m.h; y++) {
    for (let x = 0; x < m.w; x++) {
      const px = mazeOX + x*cellSize, py = mazeOY + y*cellSize;
      const walls = m.grid[y][x];
      if (walls.has("N")) { ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px+cellSize,py); ctx.stroke(); }
      if (walls.has("S")) { ctx.beginPath(); ctx.moveTo(px,py+cellSize); ctx.lineTo(px+cellSize,py+cellSize); ctx.stroke(); }
      if (walls.has("W")) { ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px,py+cellSize); ctx.stroke(); }
      if (walls.has("E")) { ctx.beginPath(); ctx.moveTo(px+cellSize,py); ctx.lineTo(px+cellSize,py+cellSize); ctx.stroke(); }
    }
  }
  // Star at end
  const scx = mazeOX + endX*cellSize + cellSize/2, scy = mazeOY + endY*cellSize + cellSize/2;
  ctx.fillStyle = "#ffd700";
  ctx.beginPath();
  for (let i=0;i<10;i++){const a=-Math.PI/2+i*Math.PI/5;const r=i%2?cellSize*0.13:cellSize*0.33;
    i?ctx.lineTo(scx+r*Math.cos(a),scy+r*Math.sin(a)):ctx.moveTo(scx+r*Math.cos(a),scy+r*Math.sin(a));}
  ctx.fill();

  // Challenge squares
  const pulse = 0.7 + 0.3*Math.sin(Date.now()/300);
  for (const key in challengeSquares) {
    const [cx2,cy2] = key.split(",").map(Number);
    const px = mazeOX + cx2*cellSize + cellSize/2;
    const py = mazeOY + cy2*cellSize + cellSize/2;
    const ir = cellSize*0.28*pulse;
    ctx.fillStyle = "#ffc832"; ctx.beginPath(); ctx.arc(px,py,ir+2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = "#b46414"; ctx.beginPath(); ctx.arc(px,py,ir,0,Math.PI*2); ctx.fill();
    drawText("?", px, py, {size:Math.max(10,cellSize*0.35), colour:"#fff", bold:true});
  }
}

// ─── GAME LOGIC ───
function startLevelFn() {
  const [w2,h2] = levelDims(level);
  maze = generateMaze(w2, h2);
  endX = w2-1; endY = h2-1;
  const maxW = W-60, maxH = H-100;
  cellSize = Math.min(maxW/w2, maxH/h2, 50);
  mazeOX = (W - w2*cellSize)/2;
  mazeOY = 70 + (H-70 - h2*cellSize)/2;
  dragon = {gx:0, gy:0, dir:"right"};
  moves = 0; timeElapsed = 0; timerPaused = false;
  challengeSquares = {};
  activeChallenge = null;
  if (challengesEnabled && challengeTables.size > 0) {
    const total = w2*h2 - 2;
    const count = Math.max(1, (total * (DENSITY_MAP[challengeDensity]||0.1))|0);
    const cands = [];
    for (let x=0;x<w2;x++) for(let y=0;y<h2;y++) if(!(x===0&&y===0)&&!(x===w2-1&&y===h2-1)) cands.push([x,y]);
    for (let i=cands.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[cands[i],cands[j]]=[cands[j],cands[i]];}
    cands.slice(0,count).forEach(([x,y])=>{challengeSquares[`${x},${y}`]=true;});
  }
  state = "show_leaderboard";
}

function generateChallenge() {
  const tables = [...challengeTables];
  const t = tables[Math.random()*tables.length|0];
  const m = (Math.random()*12|0)+1;
  const correct = t*m;
  const wrong = new Set();
  while(wrong.size<2){
    const off = [-3,-2,-1,1,2,3,t,-t][Math.random()*8|0];
    const c = correct+off;
    if(c>0 && c!==correct && !wrong.has(c)) wrong.add(c);
  }
  const answers = [correct, ...wrong].sort(()=>Math.random()-0.5);
  return {question:`${t} x ${m} = ?`, answers, correctIdx:answers.indexOf(correct), correctVal:correct, timer:challengeTimeLimit};
}

function finishChallenge(correct) {
  const rw = TIME_REWARD[challengeTimeLimit] || 5;
  if (correct) {
    timeElapsed = Math.max(0, timeElapsed - rw);
    challengeResultMsg = "Well done! That's correct!";
    challengeResultMsg2 = `${rw} seconds removed from your time!`;
    challengeResultColour = "#32dc32";
  } else {
    const q = activeChallenge.question.replace(" = ?","");
    challengeResultMsg = `Uh Oh! ${q} = ${activeChallenge.correctVal}`;
    challengeResultMsg2 = "No time penalty - better luck next time!";
    challengeResultColour = "#dc9632";
  }
  state = "challenge_result";
}

function tryMove(dx, dy, dir) {
  if (!maze.canMove(dragon.gx, dragon.gy, dir)) return;
  dragon.gx += dx; dragon.gy += dy; dragon.dir = dx>0?"right":dx<0?"left":dy>0?"down":"up";
  moves++;
  const key = `${dragon.gx},${dragon.gy}`;
  if (challengeSquares[key]) {
    delete challengeSquares[key];
    activeChallenge = generateChallenge();
    state = "challenge";
  } else if (dragon.gx === endX && dragon.gy === endY) {
    const [w2,h2] = levelDims(level);
    const bk = boardKey(w2,h2);
    if (!leaderboard[bk]) leaderboard[bk] = [];
    const rt = Math.round(timeElapsed*100)/100;
    const ex = leaderboard[bk].find(e => e.name === activeUser);
    if (ex) {
      if (rt < ex.time) { ex.time = rt; ex.moves = moves; }
    } else {
      leaderboard[bk].push({name:activeUser, time:rt, moves});
    }
    leaderboard[bk].sort((a,b)=>a.time-b.time);
    leaderboard[bk] = leaderboard[bk].slice(0,10);
    saveLB();
    submitScore(bk, activeUser, timeElapsed, moves);
    state = "level_complete";
  }
}

// ─── INPUT ───
document.addEventListener("keydown", e => {
  if (state === "new_user") {
    if (e.key === "Enter" && newUserName.trim()) {
      activeUser = newUserName.trim();
      profiles.active = activeUser;
      if (!profiles.users[activeUser]) profiles.users[activeUser] = {colour:"Red",eyes:"Big Round",size:"Medium",wings:true};
      saveProfiles(); loadUserPrefs(); state = "customise";
    } else if (e.key === "Backspace") { newUserName = newUserName.slice(0,-1);
    } else if (e.key.length === 1 && newUserName.length < 15) { newUserName += e.key; }
  } else if (state === "customise") {
    if (e.key === "Escape") { if (fullscreenPreview) fullscreenPreview = false; }
  } else if (state === "rename_user") {
    if (e.key === "Enter" && renameText.trim() && renameText.trim() !== renameTarget) {
      const newName = renameText.trim();
      // Rename in profiles
      profiles.users[newName] = profiles.users[renameTarget];
      delete profiles.users[renameTarget];
      if (activeUser === renameTarget) { activeUser = newName; profiles.active = newName; }
      // Rename in leaderboard
      for (const key in leaderboard) {
        leaderboard[key].forEach(e2 => { if (e2.name === renameTarget) e2.name = newName; });
      }
      saveProfiles(); saveLB();
      state = "change_user";
    } else if (e.key === "Enter" && renameText.trim() === renameTarget) {
      state = "change_user";
    } else if (e.key === "Escape") { state = "change_user";
    } else if (e.key === "Backspace") { renameText = renameText.slice(0,-1);
    } else if (e.key.length === 1 && renameText.length < 15) { renameText += e.key; }
  } else if (state === "change_user") {
    if (e.key === "Escape") state = "customise";
  } else if (state === "show_leaderboard") {
    state = "playing";
  } else if (state === "playing") {
    if (e.key === "Escape") { state = "customise"; return; }
    if (activeChallenge && state === "playing") return; // shouldn't happen
    if (e.key==="ArrowUp"||e.key==="w") tryMove(0,-1,"N");
    else if (e.key==="ArrowDown"||e.key==="s") tryMove(0,1,"S");
    else if (e.key==="ArrowLeft"||e.key==="a") tryMove(-1,0,"W");
    else if (e.key==="ArrowRight"||e.key==="d") tryMove(1,0,"E");
  } else if (state === "challenge") {
    if (e.key==="1") finishChallenge(activeChallenge.correctIdx===0);
    else if (e.key==="2") finishChallenge(activeChallenge.correctIdx===1);
    else if (e.key==="3") finishChallenge(activeChallenge.correctIdx===2);
    else if (e.key==="ArrowLeft") finishChallenge(activeChallenge.correctIdx===0);
    else if (e.key==="ArrowDown") finishChallenge(activeChallenge.correctIdx===1);
    else if (e.key==="ArrowRight") finishChallenge(activeChallenge.correctIdx===2);
  } else if (state === "challenge_result") {
    activeChallenge = null; state = "playing";
  } else if (state === "level_complete") {
    if (e.key === "Enter") { level++; startLevelFn(); }
    else if (e.key === "Escape") state = "customise";
  }
});

canvas.addEventListener("click", e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  if (state === "challenge_result") { activeChallenge = null; state = "playing"; return; }
  if (state === "show_leaderboard") { state = "playing"; return; }
  for (let i = buttons.length-1; i >= 0; i--) {
    const b = buttons[i];
    if (mx >= b.x && mx <= b.x+b.w && my >= b.y && my <= b.y+b.h && b.action) {
      b.action(); return;
    }
  }
});

canvas.addEventListener("mousemove", e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  hoveredBtn = null;
  for (const b of buttons) {
    if (mx >= b.x && mx <= b.x+b.w && my >= b.y && my <= b.y+b.h) { hoveredBtn = b; break; }
  }
  canvas.style.cursor = hoveredBtn ? "pointer" : "default";
});

// ─── GAME LOOP ───
function gameLoop(ts) {
  const dt = lastTime ? (ts - lastTime)/1000 : 0;
  lastTime = ts;

  if (state === "playing" && !activeChallenge) {
    timeElapsed += dt;
  } else if (state === "challenge" && activeChallenge) {
    activeChallenge.timer -= dt;
    if (activeChallenge.timer <= 0) finishChallenge(false);
  }

  if (state === "new_user") drawNewUser();
  else if (state === "customise") drawCustomise();
  else if (state === "change_user" || state === "rename_user") drawChangeUser();
  else if (state === "show_leaderboard") drawShowLeaderboard();
  else if (state === "playing" || state === "challenge" || state === "challenge_result") drawPlaying();
  else if (state === "level_complete") drawLevelComplete();

  requestAnimationFrame(gameLoop);
}

// Init
if (activeUser && profiles.users[activeUser]) { loadUserPrefs(); state = "customise"; }
requestAnimationFrame(gameLoop);
</script>
