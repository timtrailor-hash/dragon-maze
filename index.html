const DRAGON_COLOURS = {
  Red:[220,40,40], Green:[40,180,40], Blue:[40,80,220], Purple:[150,40,200],
  Gold:[220,180,30], Pink:[255,120,180], Black:[50,50,50], White:[240,240,240]
};
const EYE_STYLES = {
  "Big Round":{shape:"round",size:"big",colour:[255,255,0]},
  "Small Round":{shape:"round",size:"small",colour:[0,200,255]},
  "Cat Eyes":{shape:"cat",size:"medium",colour:[0,255,0]},
  "Angry Eyes":{shape:"angry",size:"medium",colour:[255,0,0]},
  "Cute Eyes":{shape:"cute",size:"big",colour:[100,50,255]},
  "Star Eyes":{shape:"star",size:"big",colour:[255,215,0]}
};
const SIZES = {Small:0.205, Medium:0.41, Large:0.82};
const DENSITY_MAP = {Few:0.05, Some:0.10, Many:0.15};
// Difficulty tier per number (1=easy, 4=hardest) — base seconds off
const NUM_TIER = {2:1, 3:2, 4:2, 5:1, 6:2, 7:4, 8:4, 9:2, 10:1, 11:3, 12:3};
// Timer multiplier: shorter limit = full reward
const TIMER_MULT = {10:1, 20:2/3, 30:0.5};
function calcReward(a, b, timeLimit) {
  const base = ((NUM_TIER[a]||2) + (NUM_TIER[b]||2)) / 2;
  return Math.round(base * (TIMER_MULT[timeLimit]||1) * 10) / 10;
}

const LB_API = "https://context-lexington-middle-sticker.trycloudflare.com/api/leaderboard";

// Fetch shared leaderboard on load and merge with local scores
let hasUpsynced = false;
async function fetchLeaderboard() {
  try {
    const res = await fetch(LB_API, {headers:{"Accept":"application/json"}});
    if (res.ok) {
      const serverData = await res.json();
      // Push any local scores the server doesn't have yet (once per session)
      if (!hasUpsynced && Object.keys(leaderboard).length > 0) {
        hasUpsynced = true;
        for (const [key, entries] of Object.entries(leaderboard)) {
          for (const e of entries) {
            const serverEntries = serverData[key] || [];
            const alreadyThere = serverEntries.some(s => s.name === e.name && s.time <= e.time);
            if (!alreadyThere) {
              await fetch(`${LB_API}/${key}`, {method:"POST", headers:{"Content-Type":"application/json"},
                body:JSON.stringify(e)}).catch(()=>{});
            }
          }
        }
        // Re-fetch after pushing
        const res2 = await fetch(LB_API, {headers:{"Accept":"application/json"}});
        if (res2.ok) {
          const merged = await res2.json();
          leaderboard = merged;
          localStorage.setItem("dm_leaderboard", JSON.stringify(leaderboard));
          return;
        }
      }
      // Merge server data into local (server is authoritative)
      if (serverData && typeof serverData === "object") {
        leaderboard = serverData;
        localStorage.setItem("dm_leaderboard", JSON.stringify(leaderboard));
      }
    }
  } catch(e) { console.warn("Could not fetch shared leaderboard:", e); }
}
async function submitScore(boardKey, name, time, moves) {
  // Include dragon config with score
  const dragon = {col: selectedColour, eyes: selectedEyes, size: selectedSize, wings: hasWings};
  const rt = Math.round(time*100)/100;
  // Update local immediately
  if (!leaderboard[boardKey]) leaderboard[boardKey] = [];
  const ex = leaderboard[boardKey].find(e => e.name === name);
  if (ex) { if (rt < ex.time) { ex.time = rt; ex.moves = moves; ex.dragon = dragon; } }
  else { leaderboard[boardKey].push({name, time:rt, moves, dragon}); }
  leaderboard[boardKey].sort((a,b) => a.time - b.time);
  leaderboard[boardKey] = leaderboard[boardKey].slice(0, 10);
  localStorage.setItem("dm_leaderboard", JSON.stringify(leaderboard));
  // Submit to server
  try {
    await fetch(`${LB_API}/${boardKey}`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({name, time: rt, moves, dragon, v: LB_VERSION})
    });
    fetchLeaderboard(); // Refresh from server
  } catch(e) { console.warn("Score submit failed:", e); }
}
fetchLeaderboard();

// ─── HELPERS ───
function rgb(c, a) { return a !== undefined ? `rgba(${c[0]},${c[1]},${c[2]},${a})` : `rgb(${c[0]},${c[1]},${c[2]})`; }
function shade(c, amt) { return c.map(v => Math.max(0, Math.min(255, v + amt))); }
function saveProfiles() { localStorage.setItem("dm_profiles", JSON.stringify(profiles)); }
function saveLB() { localStorage.setItem("dm_leaderboard", JSON.stringify(leaderboard)); }
function deletePlayer(name) {
  // Remove from profiles
  delete profiles.users[name];
  if (activeUser === name) {
    const remaining = Object.keys(profiles.users);
    activeUser = remaining.length > 0 ? remaining[0] : "";
    profiles.active = activeUser;
    if (activeUser) loadUserPrefs();
  }
  saveProfiles();
  // Remove from local leaderboard
  for (const key in leaderboard) {
    leaderboard[key] = leaderboard[key].filter(e => e.name !== name);
    if (leaderboard[key].length === 0) delete leaderboard[key];
  }
  saveLB();
  // Remove from server leaderboard
  fetch(`${LB_API}/delete_player`, {method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name})}).catch(()=>{});
  // If no users left, go back to new user screen
  if (Object.keys(profiles.users).length === 0) { state = "new_user"; focusMobileInput(""); }
}
function boardKey(w, h) { return `${w}x${h}`; }
const LEVEL_DIMS = [
  [6,6],[7,7],[9,9],[10,10],[11,11],[14,14],[16,16],[18,15],[19,15],[20,15]
];
function levelDims(lv) {

}

}

  profiles.users[activeUser] = { colour: selectedColour, eyes: selectedEyes, size: selectedSize, wings: hasWings };
  profiles.active = activeUser;
  saveProfiles();
}

// ─── MAZE GENERATION ───
function generateMaze(w, h) {
  const grid = [];
  for (let y = 0; y < h; y++) {
    grid[y] = [];
    for (let x = 0; x < w; x++) grid[y][x] = new Set(["N","S","E","W"]);
  }
  const visited = Array.from({length:h}, ()=>Array(w).fill(false));
  const stack = [[0,0]];
  visited[0][0] = true;
  const dirs = [[0,-1,"N","S"],[0,1,"S","N"],[1,0,"E","W"],[-1,0,"W","E"]];
  while (stack.length) {
    const [cx,cy] = stack[stack.length-1];
    const nbrs = [];
    for (const [dx,dy,d,o] of dirs) {
      const nx=cx+dx, ny=cy+dy;
      if (nx>=0 && nx<w && ny>=0 && ny<h && !visited[ny][nx]) nbrs.push([nx,ny,d,o]);
    }
    if (nbrs.length) {
      const [nx,ny,d,o] = nbrs[Math.random()*nbrs.length|0];
      grid[cy][cx].delete(d);
      grid[ny][nx].delete(o);
      visited[ny][nx] = true;
      stack.push([nx,ny]);
    } else stack.pop();
  }
  return { w, h, grid, canMove(x,y,d) { return x>=0 && x<w && y>=0 && y<h && !grid[y][x].has(d); } };
}

// ─── PROCEDURAL DRAGON RENDERER ───
// High-quality dragon drawn with bezier curves, rendered at 4x on offscreen canvas then scaled down

function drawMiniDragon(x, y, size, dragonData, playerName) {
  // Default dragon for old scores without dragon data
  if (!dragonData) dragonData = {col:"Red", eyes:"Big Round", size:"Medium", wings:true};
  const col = DRAGON_COLOURS[dragonData.col] || [200,200,200];
  const eyes = EYE_STYLES[dragonData.eyes] || EYE_STYLES["Big Round"];
  // size is the desired pixel radius — convert to drawDragon scale
  const sc = size / 42; // 42 is half the drawDragon unit space
  drawDragon(x, y, sc, "right", Date.now()/1000, col, eyes, dragonData.wings !== false);
  // Clickable area to view dragon (generous touch target)
  if (playerName) {
    const touchSize = Math.max(size, 20);
    btn(x - touchSize, y - touchSize, touchSize*2, touchSize*2, "", {alpha:0, action:()=>{viewingDragon={name:playerName, dragon:dragonData};}});
  }
}

function drawDragonPopup() {
  if (!viewingDragon) return;
  ctx.fillStyle = "rgba(15,8,25,0.92)"; ctx.fillRect(0,0,W,H);
  clearButtons();
  const d = viewingDragon.dragon;
  const col = DRAGON_COLOURS[d.col] || [200,200,200];
  const eyes = EYE_STYLES[d.eyes] || EYE_STYLES["Big Round"];
  const mob = W < 700;
  drawText(`${viewingDragon.name}'s Dragon`, W/2, mob?40:50, {size:mob?24:32, colour:"#ffd700", bold:true});
  const sz = (SIZES[d.size] || 0.82) * (mob ? 4 : 5);
  drawDragon(W/2, H/2 - 20, sz, "right", Date.now()/1000, col, eyes, d.wings !== false);
  // Info
  drawText(`${d.col} | ${d.eyes} | ${d.size} | ${d.wings!==false?"Wings":"No Wings"}`, W/2, H - (mob?80:90), {size:mob?14:18, colour:"#ccc"});
  btn(W/2-60, H-(mob?55:65), 120, 36, "Close", {colour:[120,60,60], textColour:"#fff", fontSize:16, action:()=>{viewingDragon=null;}});
  // Also close on tap anywhere else
  btn(0, 0, W, H, "", {alpha:0, action:()=>{viewingDragon=null;}});
  buttons.forEach(drawBtn);
}

function drawDragon(cx, cy, scale, dir, t, colourArr, eyeStyle, wings) {
  const renderSize = Math.max(30, scale * 84);
  const S = renderSize; // total size reference
  const s = S / 84;    // unit scale (so all coords are in ~84-unit space)

  // Bob animation from caller
  const bob = Math.sin(t * 3) * 2 * scale;

  // 4x offscreen canvas for anti-aliasing
  const ratio = 4;
  const oW = Math.ceil(S * 2.8 * ratio);
  const oH = Math.ceil(S * 2.8 * ratio);
  const oc = document.createElement("canvas");
  oc.width = oW; oc.height = oH;
  const c = oc.getContext("2d");
  c.scale(ratio, ratio);

  // Centre of offscreen canvas in logical coords
  const ocW = S * 2.8;
  const ocH = S * 2.8;
  const mx = ocW / 2;
  const my = ocH / 2;

  // Flip for left-facing
  const flipX = (dir === "left") ? -1 : 1;
  // For up/down we shift the head
  const isVert = (dir === "up" || dir === "down");

  // Colour helpers local to offscreen
  const col = colourArr;
  const _rgb = (c2, a) => a !== undefined ? `rgba(${c2[0]},${c2[1]},${c2[2]},${a})` : `rgb(${c2[0]},${c2[1]},${c2[2]})`;
  const _shade = (c2, amt) => c2.map(v => Math.max(0, Math.min(255, v + amt)));

  // Breathing animation
  const breathe = Math.sin(t * 2) * 0.5 * s;

  // ─── 1. SHADOW ───
  c.fillStyle = "rgba(0,0,0,0.18)";
  c.beginPath();
  c.ellipse(mx, my + 28*s, 22*s, 5*s, 0, 0, Math.PI*2);
  c.fill();

  // ─── 2. TAIL ───
  const tailDir = flipX;
  c.save();
  c.lineCap = "round";
  c.lineJoin = "round";
  // Tail body - thick bezier curve
  const tailWave = Math.sin(t * 3) * 3 * s;
  const tailWave2 = Math.sin(t * 3 + 1.5) * 4 * s;
  // Draw tail shadow
  c.strokeStyle = _rgb(_shade(col, -40));
  c.lineWidth = 7*s;
  c.beginPath();
  c.moveTo(mx - tailDir*12*s, my + 4*s);
  c.bezierCurveTo(
    mx - tailDir*28*s, my + 2*s + tailWave,
    mx - tailDir*40*s, my - 8*s + tailWave2,
    mx - tailDir*52*s, my - 14*s + tailWave
  );
  c.stroke();
  // Tail main
  c.strokeStyle = _rgb(_shade(col, -10));
  c.lineWidth = 5.5*s;
  c.beginPath();
  c.moveTo(mx - tailDir*12*s, my + 4*s);
  c.bezierCurveTo(
    mx - tailDir*28*s, my + 2*s + tailWave,
    mx - tailDir*40*s, my - 8*s + tailWave2,
    mx - tailDir*52*s, my - 14*s + tailWave
  );
  c.stroke();
  // Tail highlight
  c.strokeStyle = _rgb(_shade(col, 15), 0.5);
  c.lineWidth = 2*s;
  c.beginPath();
  c.moveTo(mx - tailDir*14*s, my + 2*s);
  c.bezierCurveTo(
    mx - tailDir*28*s, my + 0*s + tailWave,
    mx - tailDir*40*s, my - 10*s + tailWave2,
    mx - tailDir*50*s, my - 15*s + tailWave
  );
  c.stroke();
  // Tail spade tip
  const tipX = mx - tailDir*52*s, tipY = my - 14*s + tailWave;
  c.fillStyle = _rgb(_shade(col, -50));
  c.beginPath();
  c.moveTo(tipX, tipY - 6*s);
  c.quadraticCurveTo(tipX - tailDir*6*s, tipY - 2*s, tipX - tailDir*12*s, tipY);
  c.quadraticCurveTo(tipX - tailDir*6*s, tipY + 2*s, tipX, tipY + 6*s);
  c.quadraticCurveTo(tipX + tailDir*2*s, tipY, tipX, tipY - 6*s);
  c.fill();
  // Spade highlight
  c.fillStyle = _rgb(_shade(col, -30), 0.4);
  c.beginPath();
  c.moveTo(tipX, tipY - 4*s);
  c.quadraticCurveTo(tipX - tailDir*4*s, tipY - 1*s, tipX - tailDir*8*s, tipY);
  c.quadraticCurveTo(tipX - tailDir*3*s, tipY + 0.5*s, tipX, tipY - 4*s);
  c.fill();
  c.restore();

  // ─── 3. WINGS ───
  if (wings) {
    const flap = Math.sin(t * 4) * 10 * s;
    const flap2 = Math.sin(t * 4 + 0.5) * 6 * s;
    for (const side of [-1, 1]) {
      c.save();
      // Wing membrane (back layer, darker)
      const wingBase = mx + side * 4*s;
      const wingMid = mx + side * 32*s;
      const wingTip = mx + side * 48*s;
      const wingTip2 = mx + side * 42*s;
      const wingTip3 = mx + side * 30*s;

      // Membrane
      c.fillStyle = _rgb(_shade(col, -30), 0.45);
      c.beginPath();
      c.moveTo(wingBase, my - 6*s);
      // First finger to tip
      c.quadraticCurveTo(mx + side*20*s, my - 30*s - flap, wingTip, my - 38*s - flap);
      // Scalloped edge between fingers
      c.quadraticCurveTo(mx + side*46*s, my - 28*s - flap*0.8, wingTip2, my - 20*s - flap2);
      c.quadraticCurveTo(mx + side*38*s, my - 12*s - flap2*0.6, wingTip3, my - 6*s - flap2*0.3);
      // Scallop back
      c.quadraticCurveTo(mx + side*20*s, my + 2*s, wingBase, my + 6*s);
      c.closePath();
      c.fill();

      // Membrane inner glow
      c.fillStyle = _rgb(_shade(col, -10), 0.25);
      c.beginPath();
      c.moveTo(wingBase + side*2*s, my - 4*s);
      c.quadraticCurveTo(mx + side*18*s, my - 26*s - flap, wingTip - side*4*s, my - 34*s - flap);
      c.quadraticCurveTo(mx + side*42*s, my - 24*s - flap*0.8, wingTip2 - side*3*s, my - 17*s - flap2);
      c.quadraticCurveTo(mx + side*34*s, my - 10*s - flap2*0.6, wingTip3 - side*3*s, my - 4*s - flap2*0.3);
      c.quadraticCurveTo(mx + side*18*s, my + 2*s, wingBase + side*2*s, my + 4*s);
      c.closePath();
      c.fill();

      // Finger bones
      c.strokeStyle = _rgb(_shade(col, -55));
      c.lineWidth = 2.5*s;
      c.lineCap = "round";
      // Main arm bone
      c.beginPath();
      c.moveTo(wingBase, my - 6*s);
      c.quadraticCurveTo(mx + side*14*s, my - 18*s - flap*0.5, mx + side*24*s, my - 26*s - flap*0.7);
      c.stroke();
      // First finger
      c.lineWidth = 2*s;
      c.beginPath();
      c.moveTo(mx + side*24*s, my - 26*s - flap*0.7);
      c.quadraticCurveTo(mx + side*36*s, my - 34*s - flap*0.9, wingTip, my - 38*s - flap);
      c.stroke();
      // Second finger
      c.beginPath();
      c.moveTo(mx + side*24*s, my - 26*s - flap*0.7);
      c.quadraticCurveTo(mx + side*36*s, my - 22*s - flap2*0.8, wingTip2, my - 20*s - flap2);
      c.stroke();
      // Third finger
      c.lineWidth = 1.5*s;
      c.beginPath();
      c.moveTo(mx + side*24*s, my - 26*s - flap*0.7);
      c.quadraticCurveTo(mx + side*28*s, my - 14*s - flap2*0.5, wingTip3, my - 6*s - flap2*0.3);
      c.stroke();

      // Claw at wing tip
      c.fillStyle = "#4a4035";
      c.beginPath();
      c.moveTo(wingTip, my - 38*s - flap);
      c.lineTo(wingTip + side*3*s, my - 42*s - flap);
      c.lineTo(wingTip + side*1*s, my - 37*s - flap);
      c.fill();

      c.restore();
    }
  }

  // ─── 4. HIND LEGS ───
  for (const legSide of [-1, 1]) {
    const lx = mx + legSide * 10*s;
    const ly = my + 12*s;
    // Upper leg
    c.fillStyle = _rgb(_shade(col, -25));
    c.beginPath();
    c.ellipse(lx, ly, 6*s, 10*s, legSide * 0.15, 0, Math.PI*2);
    c.fill();
    // Lower leg
    c.fillStyle = _rgb(_shade(col, -18));
    c.beginPath();
    c.ellipse(lx + legSide*1*s, ly + 8*s, 4.5*s, 5*s, 0, 0, Math.PI*2);
    c.fill();
    // Foot
    c.fillStyle = _rgb(_shade(col, -30));
    c.beginPath();
    c.ellipse(lx + legSide*2*s, ly + 13*s, 5.5*s, 3*s, legSide*0.2, 0, Math.PI*2);
    c.fill();
    // Claws (3 per foot)
    for (let ci = -1; ci <= 1; ci++) {
      const clx = lx + legSide*2*s + ci*3*s;
      const cly = ly + 15*s;
      c.fillStyle = "#3a3025";
      c.beginPath();
      c.moveTo(clx - 1.2*s, cly);
      c.quadraticCurveTo(clx, cly + 5*s, clx + 0.5*s, cly + 5.5*s);
      c.quadraticCurveTo(clx + 1*s, cly + 4*s, clx + 1.2*s, cly);
      c.fill();
      // Claw shine
      c.fillStyle = "rgba(255,255,255,0.15)";
      c.beginPath();
      c.moveTo(clx - 0.5*s, cly + 0.5*s);
      c.quadraticCurveTo(clx, cly + 3*s, clx + 0.3*s, cly + 3.5*s);
      c.lineTo(clx + 0.8*s, cly + 0.5*s);
      c.fill();
    }
  }

  // ─── 5. BODY (bezier torso) ───
  // Main body shape using bezier for organic form
  // Shadow layer
  c.fillStyle = _rgb(_shade(col, -30));
  c.beginPath();
  c.moveTo(mx - 18*s, my - 6*s);
  c.bezierCurveTo(mx - 22*s, my - 14*s, mx - 10*s, my - 20*s + breathe, mx + 4*s, my - 18*s + breathe);
  c.bezierCurveTo(mx + 16*s, my - 16*s + breathe, mx + 24*s, my - 8*s, mx + 22*s, my + 4*s);
  c.bezierCurveTo(mx + 20*s, my + 14*s, mx + 8*s, my + 20*s, mx - 2*s, my + 18*s);
  c.bezierCurveTo(mx - 14*s, my + 16*s, mx - 22*s, my + 8*s, mx - 18*s, my - 6*s);
  c.closePath();
  c.fill();

  // Main body colour
  c.fillStyle = _rgb(col);

      c.beginPath(); c.arc(ex - eyeR*0.15, ey - eyeR*0.2, eyeR*0.12, 0, Math.PI*2); c.fill();
    }

    // Eye outline
    c.strokeStyle = _rgb(_shade(col, -50), 0.7);
    c.lineWidth = 1*s;
    c.beginPath(); c.arc(ex, ey, eyeR, 0, Math.PI*2); c.stroke();
  }

  c.restore(); // end head rotation

  // ─── 11. SPINES along back ───
  // Draw spines from head down the neck and along the back
  c.fillStyle = _rgb(_shade(col, -45));
  const spineCount = 9;
  for (let si = 0; si < spineCount; si++) {
    const sf = si / (spineCount - 1);
    // Interpolate from head to tail-start
    const spx = hx + (mx - flipX*8*s - hx) * sf;
    const spy = hy + (my + 2*s - hy) * sf;
    // Spine height varies - tallest in middle
    const spH = (4 + Math.sin(sf * Math.PI) * 6) * s;
    const spW = (1.5 + Math.sin(sf * Math.PI) * 1) * s;
    // Point upward and slightly back
    c.beginPath();
    c.moveTo(spx - spW, spy);
    c.quadraticCurveTo(spx - spW*0.3, spy - spH*0.6, spx, spy - spH);
    c.quadraticCurveTo(spx + spW*0.3, spy - spH*0.6, spx + spW, spy);
    c.fill();
    // Spine highlight
    c.fillStyle = _rgb(_shade(col, -25), 0.4);
    c.beginPath();
    c.moveTo(spx - spW*0.5, spy);
    c.lineTo(spx - spW*0.2, spy - spH*0.8);
    c.lineTo(spx + spW*0.1, spy);
    c.fill();
    c.fillStyle = _rgb(_shade(col, -45));
  }

  // ─── DRAW TO MAIN CANVAS ───
  ctx.save();
  const finalX = cx - ocW/2;
  const finalY = cy + bob - ocH/2;

  if (dir === "left") {
    ctx.translate(cx, cy + bob);
    ctx.scale(-1, 1);
    ctx.translate(-cx, -(cy + bob));
  }

  ctx.drawImage(oc, finalX, finalY, ocW, ocH);
  ctx.restore();
}

// ─── UI HELPERS ───
let hoveredBtn = null;
const buttons = [];
function btn(x, y, w, h, text, opts={}) {
  const b = {x,y,w,h,text,...opts,id:buttons.length};
  buttons.push(b);
  return b;
}
function clearButtons() { buttons.length = 0; }
function drawBtn(b) {
  if (b.alpha === 0) return; // invisible hit area, don't draw
  const hov = hoveredBtn === b;
  let col = b.colour || [200,200,200];
  if (b.selected) col = [255,215,0];
  if (hov) col = shade(col, 25);
  ctx.fillStyle = rgb(col);
  roundRect(b.x, b.y, b.w, b.h, 6);
  ctx.fill();
  ctx.strokeStyle = "#000"; ctx.lineWidth = 1.5;
  roundRect(b.x, b.y, b.w, b.h, 6); ctx.stroke();
  ctx.fillStyle = b.textColour || "#000";
  ctx.font = `bold ${b.fontSize||16}px Arial`;
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(b.text, b.x + b.w/2, b.y + b.h/2);
}
function roundRect(x,y,w,h,r) {
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}
function drawText(text, x, y, opts={}) {
  ctx.fillStyle = opts.colour || "#fff";
  ctx.font = `${opts.bold?"bold ":""}${opts.size||16}px ${opts.font||"Arial"}`;
  ctx.textAlign = opts.align || "center";
  ctx.textBaseline = opts.base || "middle";
  ctx.fillText(text, x, y);
}

// ─── MAZE DRAWING ───
function drawMaze() {
  const m = maze;
  for (let y = 0; y < m.h; y++) {
    for (let x = 0; x < m.w; x++) {
      const px = mazeOX + x*cellSize, py = mazeOY + y*cellSize;
      ctx.fillStyle = (x===0&&y===0) ? "#78dc78" : (x===endX&&y===endY) ? "#ffc850" : "#e0d5f0";
      ctx.fillRect(px, py, cellSize, cellSize);
    }
  }
  ctx.strokeStyle = "#3c2850"; ctx.lineWidth = 3;
  for (let y = 0; y < m.h; y++) {
    for (let x = 0; x < m.w; x++) {
      const px = mazeOX + x*cellSize, py = mazeOY + y*cellSize;
      const walls = m.grid[y][x];
      if (walls.has("N")) { ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px+cellSize,py); ctx.stroke(); }
      if (walls.has("S")) { ctx.beginPath(); ctx.moveTo(px,py+cellSize); ctx.lineTo(px+cellSize,py+cellSize); ctx.stroke(); }
      if (walls.has("W")) { ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px,py+cellSize); ctx.stroke(); }
      if (walls.has("E")) { ctx.beginPath(); ctx.moveTo(px+cellSize,py); ctx.lineTo(px+cellSize,py+cellSize); ctx.stroke(); }
    }
  }
  // Star at end
  const scx = mazeOX + endX*cellSize + cellSize/2, scy = mazeOY + endY*cellSize + cellSize/2;
  ctx.fillStyle = "#ffd700";
  ctx.beginPath();
  for (let i=0;i<10;i++){const a=-Math.PI/2+i*Math.PI/5;const r=i%2?cellSize*0.13:cellSize*0.33;
    i?ctx.lineTo(scx+r*Math.cos(a),scy+r*Math.sin(a)):ctx.moveTo(scx+r*Math.cos(a),scy+r*Math.sin(a));}
  ctx.fill();

  // Challenge squares
  const pulse = 0.7 + 0.3*Math.sin(Date.now()/300);
  for (const key in challengeSquares) {
    const [cx2,cy2] = key.split(",").map(Number);
    const px = mazeOX + cx2*cellSize + cellSize/2;
    const py = mazeOY + cy2*cellSize + cellSize/2;
    const ir = cellSize*0.28*pulse;
    ctx.fillStyle = "#ffc832"; ctx.beginPath(); ctx.arc(px,py,ir+2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = "#b46414"; ctx.beginPath(); ctx.arc(px,py,ir,0,Math.PI*2); ctx.fill();
    drawText("?", px, py, {size:Math.max(10,cellSize*0.35), colour:"#fff", bold:true});
  }
}

// ─── GAME LOGIC ───
function startLevelFn() {
  const [w2,h2] = levelDims(level);
  maze = generateMaze(w2, h2);
  endX = w2-1; endY = h2-1;
  const dpadSpace = isMobile ? 140 : 0;
  const maxW = W - 40 - dpadSpace, maxH = H - 120;
  cellSize = Math.min(maxW/w2, maxH/h2, 50);
  const mazeW = w2 * cellSize, mazeH = h2 * cellSize;
  mazeOX = (W - dpadSpace - mazeW) / 2;
  mazeOY = 70 + (H - 70 - dpadSpace/2 - mazeH) / 2;
  dragon = {gx:0, gy:0, dir:"right"};
  moves = 0; timeElapsed = 20; timerPaused = false;
  challengeSquares = {};
  activeChallenge = null;
  if (challengesEnabled && challengeTables.size > 0) {
    const total = w2*h2 - 2;
    const count = Math.max(1, (total * (DENSITY_MAP[challengeDensity]||0.1))|0);
    const cands = [];
    for (let x=0;x<w2;x++) for(let y=0;y<h2;y++) if(!(x===0&&y===0)&&!(x===w2-1&&y===h2-1)) cands.push([x,y]);
    for (let i=cands.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[cands[i],cands[j]]=[cands[j],cands[i]];}
    cands.slice(0,count).forEach(([x,y])=>{challengeSquares[`${x},${y}`]=true;});
  }
  state = "show_leaderboard";
}

function generateChallenge() {
  const tables = [...challengeTables];
  const a = tables[Math.random()*tables.length|0];
  const b = (Math.random()*11|0)+2; // multiplier 2-12 (skip trivial x1)
  const correct = a*b;
  const wrong = new Set();
  while(wrong.size<2){
    const off = [-3,-2,-1,1,2,3,a,-a][Math.random()*8|0];
    const c = correct+off;
    if(c>0 && c!==correct && !wrong.has(c)) wrong.add(c);
  }
  const answers = [correct, ...wrong].sort(()=>Math.random()-0.5);
  const reward = calcReward(a, b, challengeTimeLimit);
  return {question:`${a} x ${b} = ?`, answers, correctIdx:answers.indexOf(correct), correctVal:correct, timer:challengeTimeLimit, numA:a, numB:b, reward};
}

function finishChallenge(correct) {
  const rw = activeChallenge.reward;
  if (correct) {
    timeElapsed = Math.max(0, timeElapsed - rw);
    challengeResultMsg = "Well done! That's correct!";
    challengeResultMsg2 = `${rw}s removed from your time!`;
    challengeResultColour = "#32dc32";
  } else {
    const q = activeChallenge.question.replace(" = ?","");
    challengeResultMsg = `Uh Oh! ${q} = ${activeChallenge.correctVal}`;
    challengeResultMsg2 = "No time penalty - better luck next time!";
    challengeResultColour = "#dc9632";
  }
  state = "challenge_result";
}

function tryMove(dx, dy, dir) {
  if (!maze.canMove(dragon.gx, dragon.gy, dir)) return;
  dragon.gx += dx; dragon.gy += dy; dragon.dir = dx>0?"right":dx<0?"left":dy>0?"down":"up";
  moves++;
  const key = `${dragon.gx},${dragon.gy}`;
  if (challengeSquares[key]) {
    delete challengeSquares[key];
    activeChallenge = generateChallenge();
    state = "challenge";
  } else if (dragon.gx === endX && dragon.gy === endY) {
    const [w2,h2] = levelDims(level);
    const bk = boardKey(w2,h2);
    submitScore(bk, activeUser, timeElapsed, moves);
    state = "level_complete";
  }
}

// ─── INPUT ───
document.addEventListener("keydown", e => {
  if (state === "new_user") {
    if (e.key === "Enter" && newUserName.trim()) {
      activeUser = newUserName.trim();
      profiles.active = activeUser;
      if (!profiles.users[activeUser]) profiles.users[activeUser] = {colour:"Red",eyes:"Big Round",size:"Medium",wings:true};
      saveProfiles(); loadUserPrefs(); state = "customise";
    } else if (e.key === "Backspace") { newUserName = newUserName.slice(0,-1);
    } else if (e.key.length === 1 && newUserName.length < 15) { newUserName += e.key; }
  } else if (state === "how_to_play") {
    if (e.key === "Escape") state = "customise";
  } else if (state === "customise") {
    if (e.key === "Escape") { if (fullscreenPreview) fullscreenPreview = false; }
  } else if (state === "rename_user") {
    if (e.key === "Enter" && renameText.trim() && renameText.trim() !== renameTarget) {
      const newName = renameText.trim();
      // Rename in profiles
      profiles.users[newName] = profiles.users[renameTarget];
      delete profiles.users[renameTarget];
      if (activeUser === renameTarget) { activeUser = newName; profiles.active = newName; }
      // Rename in leaderboard
      for (const key in leaderboard) {
        leaderboard[key].forEach(e2 => { if (e2.name === renameTarget) e2.name = newName; });
      }
      saveProfiles(); saveLB();
      state = "change_user";
    } else if (e.key === "Enter" && renameText.trim() === renameTarget) {
      state = "change_user";
    } else if (e.key === "Escape") { state = "change_user";
    } else if (e.key === "Backspace") { renameText = renameText.slice(0,-1);
    } else if (e.key.length === 1 && renameText.length < 15) { renameText += e.key; }
  } else if (state === "change_user") {
    if (e.key === "Escape") state = "customise";
  } else if (state === "show_leaderboard") {
    if (e.key === "Enter" || e.key === " ") state = "playing";
    else if (e.key === "Escape") state = "customise";
  } else if (state === "playing") {
    if (e.key === "Escape") { state = "customise"; return; }
    if (activeChallenge && state === "playing") return; // shouldn't happen
    if (e.key==="ArrowUp"||e.key==="w") tryMove(0,-1,"N");
    else if (e.key==="ArrowDown"||e.key==="s") tryMove(0,1,"S");
    else if (e.key==="ArrowLeft"||e.key==="a") tryMove(-1,0,"W");
    else if (e.key==="ArrowRight"||e.key==="d") tryMove(1,0,"E");
  } else if (state === "challenge") {
    if (e.key==="1") finishChallenge(activeChallenge.correctIdx===0);
    else if (e.key==="2") finishChallenge(activeChallenge.correctIdx===1);
    else if (e.key==="3") finishChallenge(activeChallenge.correctIdx===2);
    else if (e.key==="ArrowLeft") finishChallenge(activeChallenge.correctIdx===0);
    else if (e.key==="ArrowDown") finishChallenge(activeChallenge.correctIdx===1);
    else if (e.key==="ArrowRight") finishChallenge(activeChallenge.correctIdx===2);
  } else if (state === "challenge_result") {
    activeChallenge = null; state = "playing";
  } else if (state === "level_complete") {
    if (e.key === "Enter") { level++; startLevelFn(); }
    else if (e.key === "Escape") state = "customise";
  }
});

canvas.addEventListener("click", e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  if (state === "challenge_result") { activeChallenge = null; state = "playing"; return; }
  // show_leaderboard now uses buttons — don't short-circuit here
  for (let i = buttons.length-1; i >= 0; i--) {
    const b = buttons[i];
    if (mx >= b.x && mx <= b.x+b.w && my >= b.y && my <= b.y+b.h && b.action) {
      b.action(); return;
    }
  }
});

canvas.addEventListener("mousemove", e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  hoveredBtn = null;
  for (const b of buttons) {
    if (mx >= b.x && mx <= b.x+b.w && my >= b.y && my <= b.y+b.h) { hoveredBtn = b; break; }
  }
  canvas.style.cursor = hoveredBtn ? "pointer" : "default";
});

// ─── MOBILE SUPPORT ───
const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || ('ontouchstart' in window);
const mobileInput = document.getElementById("mobileInput");

// Touch → click (tap)
canvas.addEventListener("touchstart", e => {
  if (e.touches.length >= 2) return; // allow pinch-to-zoom
  e.preventDefault();
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const mx = touch.clientX - rect.left, my = touch.clientY - rect.top;

  // Simulate click for buttons
  if (state === "challenge_result") { activeChallenge = null; state = "playing"; return; }
  // show_leaderboard now uses buttons — check them below, don't short-circuit

  // Check D-pad (only while playing and no challenge active)
  if ((state === "playing") && !activeChallenge && isMobile) {
    const dp = getDpadPos();
    const ddx = mx - dp.cx, ddy = my - dp.cy;
    if (Math.abs(ddx) + Math.abs(ddy) < dp.r * 3) {
      if (Math.abs(ddy) > Math.abs(ddx)) {
        ddy < 0 ? tryMove(0,-1,"N") : tryMove(0,1,"S");
      } else {
        ddx < 0 ? tryMove(-1,0,"W") : tryMove(1,0,"E");
      }
      return;
    }
  }

  for (let i = buttons.length-1; i >= 0; i--) {
    const b = buttons[i];
    if (mx >= b.x && mx <= b.x+b.w && my >= b.y && my <= b.y+b.h && b.action) {
      b.action(); return;
    }
  }
}, {passive: false});

// Swipe detection for maze movement
let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
canvas.addEventListener("touchstart", e2 => {
  const t2 = e2.touches[0];
  touchStartX = t2.clientX; touchStartY = t2.clientY; touchStartTime = Date.now();
}, {passive: true});

canvas.addEventListener("touchend", e2 => {
  if (state !== "playing" || activeChallenge) return;
  const t2 = e2.changedTouches[0];
  const dx = t2.clientX - touchStartX, dy = t2.clientY - touchStartY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const elapsed = Date.now() - touchStartTime;
  // Only count as swipe if fast and far enough, and not near D-pad
  if (dist > 30 && elapsed < 400 && touchStartX < W - 160) {
    if (Math.abs(dx) > Math.abs(dy)) {
      dx > 0 ? tryMove(1,0,"E") : tryMove(-1,0,"W");
    } else {
      dy > 0 ? tryMove(0,1,"S") : tryMove(0,-1,"N");
    }
  }
}, {passive: true});

// Prevent single-finger scroll on canvas only (allow pinch-to-zoom everywhere)
canvas.addEventListener("touchmove", e => {
  if (e.touches.length < 2) e.preventDefault();
}, {passive: false});

// Mobile text input handling (for name entry)
mobileInput.addEventListener("input", e => {
  const val = mobileInput.value;
  if (state === "new_user") { newUserName = val.slice(0, 15); }
  else if (state === "rename_user") { renameText = val.slice(0, 15); }
});
mobileInput.addEventListener("keydown", e => {
  if (e.key === "Enter" || e.key === "Go") {
    e.preventDefault();
    if (state === "new_user" && newUserName.trim()) {
      activeUser = newUserName.trim();
      profiles.active = activeUser;
      if (!profiles.users[activeUser]) profiles.users[activeUser] = {colour:"Red",eyes:"Big Round",size:"Medium",wings:true};
      saveProfiles(); loadUserPrefs(); state = "customise";
    } else if (state === "rename_user" && renameText.trim()) {
      const newName = renameText.trim();
      if (newName !== renameTarget) {
        profiles.users[newName] = profiles.users[renameTarget];
        delete profiles.users[renameTarget];
        if (activeUser === renameTarget) { activeUser = newName; profiles.active = newName; }
        for (const key in leaderboard) {
          leaderboard[key].forEach(e2 => { if (e2.name === renameTarget) e2.name = newName; });
        }
        saveProfiles(); saveLB();
      }
      state = "change_user";
    }
    mobileInput.blur();
    mobileInput.value = "";
  }
});

// Focus mobile input when entering name states
function focusMobileInput(prefill) {
  if (isMobile) {
    mobileInput.value = prefill || "";
    mobileInput.style.left = "0";
    mobileInput.focus();
    setTimeout(() => { mobileInput.style.left = "-9999px"; }, 100);
  }
}

// Draw D-pad on screen during gameplay (mobile only)
function getDpadPos() {
  return { cx: W - 70, cy: H - 80, r: 28 };
}
function drawDpad() {
  if (!isMobile) return;
  const {cx: cx2, cy: cy2, r} = getDpadPos();
  const alpha = 0.5;

  ctx.fillStyle = `rgba(60,40,80,${alpha})`;
  ctx.beginPath(); ctx.arc(cx2, cy2, r*2.4, 0, Math.PI*2); ctx.fill();

  ctx.fillStyle = `rgba(200,180,255,${alpha+0.15})`;
  // Up
  ctx.beginPath(); ctx.moveTo(cx2, cy2-r*2); ctx.lineTo(cx2-r*0.7, cy2-r*0.5); ctx.lineTo(cx2+r*0.7, cy2-r*0.5); ctx.fill();
  // Down
  ctx.beginPath(); ctx.moveTo(cx2, cy2+r*2); ctx.lineTo(cx2-r*0.7, cy2+r*0.5); ctx.lineTo(cx2+r*0.7, cy2+r*0.5); ctx.fill();
  // Left
  ctx.beginPath(); ctx.moveTo(cx2-r*2, cy2); ctx.lineTo(cx2-r*0.5, cy2-r*0.7); ctx.lineTo(cx2-r*0.5, cy2+r*0.7); ctx.fill();
  // Right
  ctx.beginPath(); ctx.moveTo(cx2+r*2, cy2); ctx.lineTo(cx2+r*0.5, cy2-r*0.7); ctx.lineTo(cx2+r*0.5, cy2+r*0.7); ctx.fill();
}

// ─── GAME LOOP ───
function gameLoop(ts) {
  const dt = lastTime ? (ts - lastTime)/1000 : 0;
  lastTime = ts;

  if (state === "playing" && !activeChallenge) {
    timeElapsed += dt;
  } else if (state === "challenge" && activeChallenge) {
    activeChallenge.timer -= dt;
    if (activeChallenge.timer <= 0) finishChallenge(false);
  }

  if (state === "new_user") drawNewUser();
  else if (state === "customise") drawCustomise();
  else if (state === "change_user" || state === "rename_user" || state === "confirm_delete") drawChangeUser();
  else if (state === "show_leaderboard") drawShowLeaderboard();
  else if (state === "playing" || state === "challenge" || state === "challenge_result") drawPlaying();
  else if (state === "level_complete") drawLevelComplete();
  else if (state === "how_to_play") drawHowToPlay();

  // Dragon popup overlay (drawn on top of everything)
  if (viewingDragon) drawDragonPopup();

  requestAnimationFrame(gameLoop);
}

// Init
if (activeUser && profiles.users[activeUser]) { loadUserPrefs(); state = "customise"; }
requestAnimationFrame(gameLoop);
</script>
